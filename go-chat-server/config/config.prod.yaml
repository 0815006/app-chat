# go-chat-server 腾讯云生产环境配置文件
# 部署路径: /root/chat-server/config/config.yaml
#
# 架构: 外部 HTTPS :8094 (Nginx SSL) → 内部 HTTP :8194 (Go 二进制)
# Go 只监听 127.0.0.1:8194，外部只能通过 Nginx 访问

server:
  port: 8194                  # Go 内部 HTTP 端口（仅 127.0.0.1 监听，不对外）
  mode: release               # 生产环境必须使用 release 模式

database:
  host: 127.0.0.1             # 腾讯云本地 Docker MySQL
  port: 3306
  user: root
  password: "root"            # ← 替换为实际 MySQL root 密码
  dbname: chat_db
  charset: utf8mb4
  parse_time: true
  loc: Local

redis:
  enable: true                # 生产环境启用 Redis
  addr: 127.0.0.1:6379        # 腾讯云本地 Docker Redis
  password: ""                # ← 如 Redis 设置了密码请填写
  db: 0

jwt:
  secret: "go-chat-server-prod-jwt-secret-change-me"   # ← 必须修改为随机强密码！
  expire_hours: 72

upload:
  dir: "/root/chat-server/uploads"                                     # 文件上传存储目录（绝对路径）
  url_prefix: "https://你的域名:8094/uploads"                           # ← 替换为实际域名（HTTPS + Nginx 端口）
  max_img: 10    # 图片最大尺寸(MB)
  max_file: 500  # 文件最大尺寸(MB)
  max_voice: 5   # 语音最大尺寸(MB)
