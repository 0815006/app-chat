# go-chat-server 配置文件
# 语法：${环境变量名:默认值}
#   - 本地 dev 启动：不设任何环境变量，全部使用默认值
#   - 内网 LAN 部署：build-server-lan.bat 构建时 set 环境变量 → --expand-config 展开为写死值的 config.yaml
#   - 腾讯云部署：systemd Environment= 注入环境变量覆盖默认值
server:
  port: ${CHAT_SERVER_PORT:8194}
  mode: ${CHAT_SERVER_MODE:debug}  # debug | release | test

database:
  host: ${DB_HOST:127.0.0.1}
  port: ${DB_PORT:3306}
  user: ${DB_USER:root}
  password: "${DB_PASSWORD:root}"
  dbname: ${DB_NAME:chat_db}
  charset: ${DB_CHARSET:utf8mb4}
  parse_time: ${DB_PARSE_TIME:true}
  loc: ${DB_LOC:Local}

redis:
  enable: ${REDIS_ENABLE:true}
  addr: ${REDIS_ADDR:127.0.0.1:6379}
  password: "${REDIS_PASSWORD:}"
  db: ${REDIS_DB:0}

jwt:
  secret: "${JWT_SECRET:go-chat-server-jwt-secret-change-in-production}"
  expire_hours: ${JWT_EXPIRE_HOURS:72}

upload:
  dir: "${UPLOAD_DIR:./uploads}"
  url_prefix: "${UPLOAD_URL_PREFIX:http://127.0.0.1:8194/uploads}"
  max_img: ${UPLOAD_MAX_IMG:10}    # 图片最大尺寸(MB)
  max_file: ${UPLOAD_MAX_FILE:500}  # 文件最大尺寸(MB)
  max_voice: ${UPLOAD_MAX_VOICE:5}  # 语音最大尺寸(MB)
