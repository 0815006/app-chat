# ===================================================
# app-chat 内网 Linux 摆渡代理 (流量传话筒)
# Linux 服务器 (22.188.9.15) → 反向代理回本地 Windows 开发机
# 部署路径：/etc/nginx/conf.d/nginx-chat-dmz.conf
# 生效命令：nginx -t && nginx -s reload
# ===================================================

server {
    listen       8084;               # 外援同事访问 Linux 的端口
    server_name  _;                   # 通配，无需绑定具体 IP

    # 文件上传大小限制（与后端 Go upload.max_file 保持一致）
    client_max_body_size 500m;

    # 1. 后端 API 反向代理（转发到 Windows 开发机 Go 8094 端口）
    location /api/ {
        proxy_pass http://22.189.27.79:8094/api/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. WebSocket 长连接反向代理（聊天实时消息）
    location /ws {
        proxy_pass http://22.189.27.79:8094/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接不设超时
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 3. 文件上传静态资源反向代理（头像、图片、文件等）
    location /uploads/ {
        proxy_pass http://22.189.27.79:8094/uploads/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Web 前端 SPA（由 Go 二进制内嵌提供，Nginx 纯反代）
    location / {
        proxy_pass http://22.189.27.79:8094/;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
