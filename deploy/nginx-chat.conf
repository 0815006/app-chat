# ===================================================
# app-chat Go 后端 (HTTPS + 域名)
# 通过域名或 IP:8084 以 HTTPS 方式访问后端 API
# 部署路径：/etc/nginx/conf.d/app-chat.conf
# ===================================================

server {
    # 8084 端口走 HTTPS
    listen 8084 ssl;
    server_name realapex.site 129.211.9.238;

    # SSL 证书配置（与 aicode 项目共用证书）
    ssl_certificate /etc/nginx/cert/realapex.site_bundle.pem;
    ssl_certificate_key /etc/nginx/cert/realapex.site.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 文件上传大小限制（与后端 Go upload.max_file 保持一致）
    client_max_body_size 500m;

    # 1. 后端 API 反向代理（转发到 Go 二进制本地 HTTP 8094 端口）
    location /api/ {
        proxy_pass http://127.0.0.1:8094/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. WebSocket 长连接反向代理（聊天实时消息）
    location /ws {
        proxy_pass http://127.0.0.1:8094/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接不设超时
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 3. 文件上传静态资源反向代理（头像、图片、文件等）
    location /uploads/ {
        proxy_pass http://127.0.0.1:8094/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Web 前端 SPA（由 Go 二进制内嵌提供，Nginx 纯反代）
    location / {
        proxy_pass http://127.0.0.1:8094/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
