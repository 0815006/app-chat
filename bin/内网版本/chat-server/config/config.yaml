# go-chat-server 内网 Windows 部署配置 (22.189.27.79)
# 架构: HTTP 直连 8194 端口（无 Nginx / 无 HTTPS，Go 直接对外服务）
# MySQL 位于内网另一台机器 22.188.9.144
server:
  port: 8194
  mode: release  # debug | release | test

database:
  host: 22.188.9.144
  port: 3306
  user: root
  password: "Star002!"
  dbname: chat_db
  charset: utf8mb4
  parse_time: true
  loc: Local

redis:
  enable: false          # 内网暂不启用 Redis
  addr: 127.0.0.1:6379
  password: ""
  db: 0

jwt:
  secret: "go-chat-server-prod-jwt-secret-change-me"
  expire_hours: 72

upload:
  dir: "D:/data/chat-server/uploads"
  url_prefix: "http://22.189.27.79:8194/uploads"
  max_img: 10    # 图片最大尺寸(MB)
  max_file: 500   # 文件最大尺寸(MB)
  max_voice: 5   # 语音最大尺寸(MB)
